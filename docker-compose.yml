version: "3.8"

services:
  mumble-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: mumble-proxy
    restart: unless-stopped
    ports:
      - "64737:64737"
    environment:
      - PROXY_LISTEN=0.0.0.0:64737
      - PROXY_SERVER=${MUMBLE_SERVER:-your-mumble-server.com:64738}
      - PROXY_CERT_VERIFY=false
    command: ["./proxy", "--listen", "0.0.0.0:64737", "--server", "${MUMBLE_SERVER:-your-mumble-server.com:64738}", "--cert-verify=false"]
    networks:
      - mumble-net

  mumble-web:
    build:
      context: ./web
      dockerfile: ../docker/Dockerfile.web
    container_name: mumble-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mumble-proxy
    networks:
      - mumble-net

networks:
  mumble-net:
    driver: bridge
